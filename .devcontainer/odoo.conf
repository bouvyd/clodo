[options]
; Addons resolved from the rw-mounted source repos.
addons_path = /workspace/src/odoo/addons,/workspace/src/enterprise,/workspace/src/design-themes,/workspace/src/custom
; Filestore / sessions live on the host (bind-mounted) so they survive rebuilds.
data_dir = /workspace/.odoo

; Database (the `db` service on the compose network).
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

admin_passwd = admin
http_port = 8069
gevent_port = 8072

; Dev-friendly: single process, no request timeouts so breakpoints don't die.
workers = 0
max_cron_threads = 1
limit_time_cpu = 0
limit_time_real = 0
